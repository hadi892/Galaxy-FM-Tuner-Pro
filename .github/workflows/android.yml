name: Android CI/CD Build Pipeline (SM6375 Hardware Pass-Through)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify Offline Hardware FM Tuner APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Djava.awt.headless=true -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Environment
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Ensure Gradle Wrapper Exists & Executable
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Generating Gradle Wrapper with Gradle 9.3.1..."
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x ./gradlew

      - name: Prepare Android Default Signing Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          fi
          if [ ! -f debug.keystore ]; then
            echo "Generating default debug keystore for CI..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          cp debug.keystore release.keystore
          if ! keytool -list -keystore release.keystore -storepass android | grep -q "upload"; then
            keytool -changealias -keystore release.keystore -storepass android -keypass android -alias androiddebugkey -destalias upload || true
          fi
          echo "KEYSTORE_PATH=release.keystore" >> $GITHUB_ENV
          echo "STORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Validate Code & Run Robolectric JVM Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build Debug APK (SM6375 / WCN399x Tuner Supported)
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM6375-Offline-FMTuner-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SM6375-Offline-FMTuner-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
