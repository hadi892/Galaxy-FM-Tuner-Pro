name: Android CI (No Wrapper Fix)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ❗ نصب Gradle کامل (بدون wrapper)
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # ❗ Build مستقیم با Gradle سیستم
      - name: Build Debug APK
        run: gradle assembleDebug

      # پیدا کردن APK
      - name: Find APK
        run: find . -type f -name "*.apk"

      # Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: "**/*.apk"
