name: Android CI - Auto Module Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle

      # 🔍 پیدا کردن ماژول واقعی
      - name: Detect Android module
        id: detect
        run: |
          echo "Searching for Android modules..."

          MODULE=$(grep -R "include" settings.gradle* 2>/dev/null | head -n 1 | sed "s/.*include//" | tr -d ":,'\" ")

          if [ -z "$MODULE" ]; then
            MODULE="app"
          fi

          echo "MODULE=$MODULE" >> $GITHUB_ENV
          echo "Detected module: $MODULE"

      - name: Show structure
        run: ls -R

      # 🔥 Build با ماژول پیدا شده
      - name: Build APK
        run: gradle :$MODULE:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
